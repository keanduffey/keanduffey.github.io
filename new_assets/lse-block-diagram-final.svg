<svg width="580" height="284" viewBox="0 0 580 284" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" role="img"
     aria-label="Energy Storage Unit block diagram showing two electrolyte tanks in series feeding four parallel cell stacks connected to an inverter, all within a repeating ESU module">
  <defs>
    <marker id="bd-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5753"/>
    </marker>
  </defs>

  <rect width="580" height="284" fill="#F5F1EB"/>

  <!-- ESU dashed bounding box -->
  <rect x="10" y="28" width="484" height="248" rx="6" fill="none" stroke="#1F1F1C" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="252" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1C">Energy Storage Unit (ESU)</text>

  <!-- Repeat indicator (ghost ESU at offset, behind main) -->
  <rect x="22" y="36" width="484" height="248" rx="6" fill="none" stroke="#DDD8D0" stroke-width="1" stroke-dasharray="6,5" opacity="0.6"/>

  <!-- ── TANKS (in series, stacked vertically) ──────────── -->
  <!-- Neg Tank -->
  <rect x="28" y="66" width="96" height="80" rx="4" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.5"/>
  <text x="76" y="109" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1C">Negative</text>
  <text x="76" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1C">Tank</text>

  <!-- Series connection: Neg tank bottom → Pos tank top -->
  <line x1="76" y1="146" x2="76" y2="164" stroke="#5A5753" stroke-width="1.4" marker-end="url(#bd-arr)"/>

  <!-- Pos Tank -->
  <rect x="28" y="166" width="96" height="80" rx="4" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.5"/>
  <text x="76" y="201" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1C">Positive</text>
  <text x="76" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1C">Tank</text>

  <!-- ── STACKS ───────────────────────────────────────── -->
  <!-- Stack label at top -->
  <text x="243" y="54" text-anchor="middle" font-size="9" fill="#5A5753">4 × power module (parallel)</text>

  <!-- Stack 1 -->
  <rect x="188" y="62" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="84" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Power Module 1</text>

  <!-- Stack 2 -->
  <rect x="188" y="110" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="132" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Power Module 2</text>

  <!-- Stack 3 -->
  <rect x="188" y="172" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="194" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Power Module 3</text>

  <!-- Stack 4 -->
  <rect x="188" y="220" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="242" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Power Module 4</text>

  <!-- ── FLOW CONNECTIONS (tanks to stacks) ───────────── -->
  <!-- From Pos tank right edge → manifold at x=160, then branch to all 4 stacks -->
  <line x1="124" y1="206" x2="160" y2="206" stroke="#5A5753" stroke-width="1.4" marker-end="url(#bd-arr)"/>
  <!-- Manifold vertical — only spans between top and bottom branch points -->
  <line x1="160" y1="80"  x2="160" y2="238" stroke="#5A5753" stroke-width="1.4"/>
  <!-- Branches from manifold to each stack -->
  <line x1="160" y1="80"  x2="188" y2="80"  stroke="#5A5753" stroke-width="1.4" marker-end="url(#bd-arr)"/>
  <line x1="160" y1="128" x2="188" y2="128" stroke="#5A5753" stroke-width="1.4" marker-end="url(#bd-arr)"/>
  <line x1="160" y1="190" x2="188" y2="190" stroke="#5A5753" stroke-width="1.4" marker-end="url(#bd-arr)"/>
  <line x1="160" y1="238" x2="188" y2="238" stroke="#5A5753" stroke-width="1.4" marker-end="url(#bd-arr)"/>

  <!-- ── BUS (stacks to inverter) ──────────────────────── -->
  <!-- Vertical bus at x=310, spanning only between branch points -->
  <line x1="310" y1="80" x2="310" y2="238" stroke="#1F1F1C" stroke-width="1.8"/>
  <!-- Horizontal branches from each stack right edge to bus -->
  <line x1="298" y1="80"  x2="310" y2="80"  stroke="#1F1F1C" stroke-width="1.4"/>
  <line x1="298" y1="128" x2="310" y2="128" stroke="#1F1F1C" stroke-width="1.4"/>
  <line x1="298" y1="190" x2="310" y2="190" stroke="#1F1F1C" stroke-width="1.4"/>
  <line x1="298" y1="238" x2="310" y2="238" stroke="#1F1F1C" stroke-width="1.4"/>

  <!-- Bus to inverter arrow -->
  <line x1="310" y1="152" x2="350" y2="152" stroke="#1F1F1C" stroke-width="1.5" marker-end="url(#bd-arr)"/>

  <!-- ── INVERTER ───────────────────────────────────────── -->
  <rect x="352" y="122" width="80" height="60" rx="4" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.5"/>
  <text x="392" y="156" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Inverter</text>

  <!-- AC output arrow -->
  <line x1="432" y1="152" x2="460" y2="152" stroke="#1F1F1C" stroke-width="1.5" marker-end="url(#bd-arr)"/>
  <text x="463" y="148" font-size="9" fill="#1F1F1C">AC</text>
  <text x="463" y="160" font-size="9" fill="#1F1F1C">Grid</text>

  <!-- × N ESU note -->
  <text x="520" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#5A5753">× N</text>
  <text x="520" y="166" text-anchor="middle" font-size="8.5" fill="#5A5753">ESUs</text>
</svg>
