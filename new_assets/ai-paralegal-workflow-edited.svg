<svg width="560" height="280" viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" role="img"
     aria-label="Technical Paralegal multi-agent AI system: supervisory agent distributes tasks across specialized subagents for document review, information retrieval, comparison, summarization, and fact-checking before producing a final output">
  <defs>
    <marker id="tp-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5753"/>
    </marker>
    <marker id="tp-arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C96442"/>
    </marker>
  </defs>

  <rect width="560" height="280" fill="#F5F1EB"/>

  <text x="280" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#1F1F1C">Technical Paralegal — Multi-Agent System</text>

  <!-- ── DOCUMENT INPUTS (left) ─────────────────── -->
  <!-- Doc icons: 3 stacked -->
  <rect x="12" y="70"  width="42" height="32" rx="2" fill="#DDD8D0" stroke="#5A5753" stroke-width="1.2"/>
  <polygon points="48,70 54,70 48,76" fill="#C4BFB8" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="80" x2="48" y2="80" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="87" x2="48" y2="87" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="94" x2="40" y2="94" stroke="#5A5753" stroke-width="0.8"/>

  <rect x="12" y="112" width="42" height="32" rx="2" fill="#DDD8D0" stroke="#5A5753" stroke-width="1.2"/>
  <polygon points="48,112 54,112 48,118" fill="#C4BFB8" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="122" x2="48" y2="122" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="129" x2="48" y2="129" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="136" x2="40" y2="136" stroke="#5A5753" stroke-width="0.8"/>

  <rect x="12" y="154" width="42" height="32" rx="2" fill="#DDD8D0" stroke="#5A5753" stroke-width="1.2"/>
  <polygon points="48,154 54,154 48,160" fill="#C4BFB8" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="164" x2="48" y2="164" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="171" x2="48" y2="171" stroke="#5A5753" stroke-width="0.8"/>
  <line x1="18" y1="178" x2="40" y2="178" stroke="#5A5753" stroke-width="0.8"/>

  <text x="33" y="206" text-anchor="middle" font-size="8" fill="#5A5753">Loan</text>
  <text x="33" y="217" text-anchor="middle" font-size="8" fill="#5A5753">Docs</text>

  <!-- Arrow: docs to supervisory agent -->
  <line x1="66" y1="130" x2="88" y2="130" stroke="#5A5753" stroke-width="1.5" marker-end="url(#tp-arr)"/>

  <!-- ── SUPERVISORY AGENT (center-left) ───────── -->
  <rect x="90" y="100" width="106" height="60" rx="5" fill="#EDEAE3" stroke="#C96442" stroke-width="2"/>
  <text x="143" y="123" text-anchor="middle" font-size="9"  font-weight="600" fill="#C96442">Supervisory</text>
  <text x="143" y="137" text-anchor="middle" font-size="9"  font-weight="600" fill="#C96442">Agent</text>
  <text x="143" y="150" text-anchor="middle" font-size="8"  fill="#5A5753">routes tasks</text>

  <!-- Fork lines: supervisory to 5 subagents -->
  <line x1="196" y1="130" x2="218" y2="130" stroke="#5A5753" stroke-width="1.4"/>
  <!-- Vertical trunk -->
  <line x1="218" y1="48"  x2="218" y2="212" stroke="#5A5753" stroke-width="1.4"/>
  <!-- 5 horizontal branches to subagent boxes -->
  <line x1="218" y1="48"  x2="238" y2="48"  stroke="#5A5753" stroke-width="1.4" marker-end="url(#tp-arr)"/>
  <line x1="218" y1="89"  x2="238" y2="89"  stroke="#5A5753" stroke-width="1.4" marker-end="url(#tp-arr)"/>
  <line x1="218" y1="130" x2="238" y2="130" stroke="#5A5753" stroke-width="1.4" marker-end="url(#tp-arr)"/>
  <line x1="218" y1="171" x2="238" y2="171" stroke="#5A5753" stroke-width="1.4" marker-end="url(#tp-arr)"/>
  <line x1="218" y1="212" x2="238" y2="212" stroke="#5A5753" stroke-width="1.4" marker-end="url(#tp-arr)"/>

  <!-- ── SUBAGENT BOXES ─────────────────────────── -->
  <!-- 1: Review & Catalogue -->
  <rect x="240" y="30" width="138" height="36" rx="4" fill="#EDEAE3" stroke="#C96442" stroke-width="1.6"/>
  <text x="309" y="47" text-anchor="middle" font-size="8.5" font-weight="600" fill="#C96442">Review &amp; Catalogue</text>
  <text x="309" y="59" text-anchor="middle" font-size="8"   fill="#5A5753">new documents</text>

  <!-- 2: Retrieve Information -->
  <rect x="240" y="71" width="138" height="36" rx="4" fill="#EDEAE3" stroke="#C96442" stroke-width="1.6"/>
  <text x="309" y="88" text-anchor="middle" font-size="8.5" font-weight="600" fill="#C96442">Retrieve Information</text>
  <text x="309" y="100" text-anchor="middle" font-size="8"   fill="#5A5753">from document corpus</text>

  <!-- 3: Compare Documents -->
  <rect x="240" y="112" width="138" height="36" rx="4" fill="#EDEAE3" stroke="#C96442" stroke-width="1.6"/>
  <text x="309" y="129" text-anchor="middle" font-size="8.5" font-weight="600" fill="#C96442">Compare Documents</text>
  <text x="309" y="141" text-anchor="middle" font-size="8"   fill="#5A5753">identify changes / conflicts</text>

  <!-- 4: Summarize / Draft -->
  <rect x="240" y="153" width="138" height="36" rx="4" fill="#EDEAE3" stroke="#C96442" stroke-width="1.6"/>
  <text x="309" y="170" text-anchor="middle" font-size="8.5" font-weight="600" fill="#C96442">Summarize / Draft</text>
  <text x="309" y="182" text-anchor="middle" font-size="8"   fill="#5A5753">responses and memos</text>

  <!-- 5: Fact Check -->
  <rect x="240" y="194" width="138" height="36" rx="4" fill="#EDEAE3" stroke="#C96442" stroke-width="1.6"/>
  <text x="309" y="211" text-anchor="middle" font-size="8.5" font-weight="600" fill="#C96442">Fact Check</text>
  <text x="309" y="223" text-anchor="middle" font-size="8"   fill="#5A5753">verify claims and figures</text>

  <!-- Join lines: subagents to output bus -->
  <line x1="378" y1="48"  x2="404" y2="48"  stroke="#5A5753" stroke-width="1.4"/>
  <line x1="378" y1="89"  x2="404" y2="89"  stroke="#5A5753" stroke-width="1.4"/>
  <line x1="378" y1="130" x2="404" y2="130" stroke="#5A5753" stroke-width="1.4"/>
  <line x1="378" y1="171" x2="404" y2="171" stroke="#5A5753" stroke-width="1.4"/>
  <line x1="378" y1="212" x2="404" y2="212" stroke="#5A5753" stroke-width="1.4"/>
  <!-- Vertical join trunk -->
  <line x1="404" y1="48"  x2="404" y2="212" stroke="#5A5753" stroke-width="1.4"/>
  <!-- Trunk to output box -->
  <line x1="404" y1="130" x2="426" y2="130" stroke="#5A5753" stroke-width="1.5" marker-end="url(#tp-arr)"/>

  <!-- ── OUTPUT BOX ────────────────────────────────── -->
  <rect x="428" y="100" width="110" height="60" rx="5" fill="#D6E8D6" stroke="#5A8A5A" stroke-width="1.8"/>
  <text x="483" y="123" text-anchor="middle" font-size="9"  font-weight="600" fill="#2A5A2A">Final</text>
  <text x="483" y="137" text-anchor="middle" font-size="9"  font-weight="600" fill="#2A5A2A">Output</text>
  <text x="483" y="151" text-anchor="middle" font-size="8"  fill="#5A8A5A">memo / analysis</text>

</svg>
