<svg width="560" height="250" viewBox="0 0 560 250" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" role="img"
     aria-label="Limiting current SOC sensor schematic showing small working electrode tip closely spaced to a large counter electrode in a flow channel with upstream and downstream isolation valves">
  <defs>
    <marker id="lc-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A7A9B"/>
    </marker>
  </defs>

  <rect width="560" height="250" fill="#F5F1EB"/>

  <text x="280" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1F1F1C">Limiting Current SOC Sensor</text>

  <!-- Channel electrolyte fill -->
  <rect x="18" y="95" width="524" height="62" fill="#D6E8F2"/>
  <!-- Measurement zone highlight (between valves) -->
  <rect x="112" y="95" width="336" height="62" fill="#C2D8EC" opacity="0.7"/>
  <!-- Channel walls -->
  <line x1="18" y1="95"  x2="542" y2="95"  stroke="#4A7A9B" stroke-width="2"/>
  <line x1="18" y1="157" x2="542" y2="157" stroke="#4A7A9B" stroke-width="2"/>

  <!-- Flow arrows outside measurement zone -->
  <line x1="35"  y1="126" x2="68"  y2="126" stroke="#4A7A9B" stroke-width="1.5" marker-end="url(#lc-arr)"/>
  <line x1="482" y1="126" x2="515" y2="126" stroke="#4A7A9B" stroke-width="1.5" marker-end="url(#lc-arr)"/>
  <text x="22"  y="90" font-size="9" fill="#4A7A9B">electrolyte flow</text>
  <text x="519" y="90" font-size="9" fill="#4A7A9B">out</text>

  <!-- Valve 1 (left, x=112) — gate valve symbol -->
  <rect x="105" y="80" width="14" height="15" rx="1" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.2"/>
  <line x1="112" y1="95" x2="112" y2="157" stroke="#1F1F1C" stroke-width="3"/>
  <rect x="105" y="157" width="14" height="15" rx="1" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.2"/>
  <text x="112" y="75" text-anchor="middle" font-size="8.5" fill="#1F1F1C">valve</text>

  <!-- Valve 2 (right, x=448) -->
  <rect x="441" y="80" width="14" height="15" rx="1" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.2"/>
  <line x1="448" y1="95" x2="448" y2="157" stroke="#1F1F1C" stroke-width="3"/>
  <rect x="441" y="157" width="14" height="15" rx="1" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.2"/>
  <text x="448" y="75" text-anchor="middle" font-size="8.5" fill="#1F1F1C">valve</text>

  <!-- WE probe shaft -->
  <line x1="270" y1="50" x2="270" y2="120" stroke="#1F1F1C" stroke-width="2"/>
  <!-- WE tip (small disk) -->
  <circle cx="270" cy="124" r="5" fill="#1F1F1C"/>

  <!-- CE (large rectangular electrode, very close to WE tip) -->
  <rect x="288" y="102" width="22" height="51" rx="1" fill="#888580" stroke="#1F1F1C" stroke-width="1.5"/>
  <!-- CE hatching lines to indicate electrode surface -->
  <line x1="288" y1="108" x2="310" y2="108" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="288" y1="116" x2="310" y2="116" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="288" y1="124" x2="310" y2="124" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="288" y1="132" x2="310" y2="132" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="288" y1="140" x2="310" y2="140" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="288" y1="148" x2="310" y2="148" stroke="#DDD8D0" stroke-width="0.8"/>

  <!-- Gap annotation (close spacing) -->
  <line x1="275" y1="146" x2="288" y2="146" stroke="#C96442" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="281" y="158" text-anchor="middle" font-size="7.5" fill="#C96442">~1 mm</text>

  <!-- WE label -->
  <text x="252" y="95" text-anchor="end" font-size="9" font-weight="600" fill="#1F1F1C">WE</text>
  <text x="252" y="106" text-anchor="end" font-size="7.5" fill="#5A5753">small tip</text>
  <line x1="254" y1="104" x2="264" y2="118" stroke="#5A5753" stroke-width="0.8"/>

  <!-- CE label -->
  <text x="318" y="114" font-size="9" font-weight="600" fill="#1F1F1C">CE</text>
  <text x="318" y="125" font-size="7.5" fill="#5A5753">large</text>
  <text x="318" y="135" font-size="7.5" fill="#5A5753">electrode</text>

  <!-- Potentiostat / signal conditioning box -->
  <rect x="218" y="18" width="104" height="28" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.5"/>
  <text x="270" y="36" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Potentiostat</text>

  <!-- WE wire (shaft goes up from potentiostat bottom at y=46) -->
  <!-- WE probe shaft already drawn from y=50 — wire from box bottom to shaft top -->
  <line x1="270" y1="46" x2="270" y2="50" stroke="#1F1F1C" stroke-width="1.2"/>

  <!-- CE wire (from top of CE at x=299,y=102 up to potentiostat) -->
  <line x1="299" y1="102" x2="299" y2="46" stroke="#1F1F1C" stroke-width="1.2"/>
  <line x1="270" y1="46" x2="299" y2="46" stroke="#1F1F1C" stroke-width="1.2"/>

  <!-- SOC output arrow from potentiostat -->
  <line x1="322" y1="32" x2="352" y2="32" stroke="#C96442" stroke-width="1.5" marker-end="url(#lc-arr)"/>
  <text x="355" y="36" font-size="8.5" fill="#C96442">SOC signal</text>

  <!-- "Measurement zone" label -->
  <text x="280" y="185" text-anchor="middle" font-size="8.5" fill="#5A5753">Valves close to stop flow during measurement</text>
  <text x="280" y="197" text-anchor="middle" font-size="8.5" fill="#5A5753">Steady-state limiting current is proportional to electrolyte SOC</text>
</svg>
