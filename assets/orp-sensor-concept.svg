<svg width="560" height="250" viewBox="0 0 560 250" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" role="img"
     aria-label="ORP-based state-of-charge sensor schematic showing probe with sensing and reference electrodes in a flow channel tee fitting, with calibration curve illustrating the dE/dS versus SOC relationship">
  <defs>
    <marker id="orp-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A7A9B"/>
    </marker>
    <marker id="orp-arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C96442"/>
    </marker>
  </defs>

  <rect width="560" height="250" fill="#F5F1EB"/>

  <text x="280" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1F1F1C">ORP-Based SOC Sensor</text>

  <!-- === LEFT: PROBE IN FLOW CHANNEL === -->

  <!-- Flow channel -->
  <rect x="18" y="100" width="300" height="56" fill="#D6E8F2"/>
  <line x1="18" y1="100" x2="318" y2="100" stroke="#4A7A9B" stroke-width="2"/>
  <line x1="18" y1="156" x2="318" y2="156" stroke="#4A7A9B" stroke-width="2"/>

  <!-- Tee fitting body (vertical branch from top) -->
  <rect x="148" y="56" width="44" height="44" rx="2" fill="#EDEAE3" stroke="#5A5753" stroke-width="1.5"/>
  <!-- Tee connection lines to channel walls (disguise the rectangular overlap) -->
  <line x1="148" y1="100" x2="148" y2="100" stroke="#4A7A9B" stroke-width="2"/>
  <line x1="192" y1="100" x2="192" y2="100" stroke="#4A7A9B" stroke-width="2"/>
  <rect x="148" y="97" width="44" height="10" fill="#D6E8F2"/> <!-- join fill -->

  <!-- Flow arrows -->
  <line x1="35"  y1="128" x2="70"  y2="128" stroke="#4A7A9B" stroke-width="1.5" marker-end="url(#orp-arr)"/>
  <line x1="240" y1="128" x2="275" y2="128" stroke="#4A7A9B" stroke-width="1.5" marker-end="url(#orp-arr)"/>
  <text x="20" y="95" font-size="9" fill="#4A7A9B">electrolyte flow →</text>

  <!-- Probe housing (inserted from top into tee) -->
  <rect x="157" y="30" width="26" height="78" rx="2" fill="#EDEAE3" stroke="#5A5753" stroke-width="1.5"/>
  <text x="170" y="24" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1F1F1C">Probe</text>

  <!-- Sensing electrode (Pt) - larger, on left side of probe -->
  <rect x="161" y="102" width="7" height="40" rx="1" fill="#C96442" stroke="#7A2A14" stroke-width="1"/>
  <!-- Reference electrode (Ag/AgCl) - on right side -->
  <rect x="172" y="106" width="7" height="34" rx="1" fill="#4A7A9B" stroke="#2A4A6A" stroke-width="1"/>

  <!-- Electrode labels inside probe -->
  <text x="161" y="85" font-size="7.5" font-weight="600" fill="#C96442">SE</text>
  <text x="172" y="85" font-size="7.5" font-weight="600" fill="#4A7A9B">RE</text>
  <text x="160" y="94" font-size="6.5" fill="#5A5753">Pt</text>
  <text x="171" y="94" font-size="6.5" fill="#5A5753">Ag</text>

  <!-- Signal wire from probe top to voltmeter box -->
  <line x1="170" y1="30" x2="170" y2="16" stroke="#5A5753" stroke-width="1.2"/>
  <line x1="170" y1="16" x2="96" y2="16" stroke="#5A5753" stroke-width="1.2"/>
  <line x1="96" y1="16" x2="96" y2="30" stroke="#5A5753" stroke-width="1.2" marker-end="url(#orp-arr)"/>

  <!-- Voltmeter / signal conditioning box -->
  <rect x="34" y="30" width="74" height="32" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.5"/>
  <text x="71" y="44" text-anchor="middle" font-size="8" font-weight="600" fill="#1F1F1C">Voltmeter /</text>
  <text x="71" y="56" text-anchor="middle" font-size="8" font-weight="600" fill="#1F1F1C">Conditioner</text>

  <!-- ORP output -->
  <line x1="34" y1="46" x2="20" y2="46" stroke="#C96442" stroke-width="1.2"/>
  <text x="18" y="42" text-anchor="end" font-size="8" fill="#C96442">ORP</text>
  <text x="18" y="53" text-anchor="end" font-size="8" fill="#C96442">→ SOC</text>

  <!-- Probe labels -->
  <text x="202" y="116" font-size="7.5" fill="#C96442">SE: sensing (Pt)</text>
  <text x="202" y="128" font-size="7.5" fill="#4A7A9B">RE: reference (Ag/AgCl)</text>

  <!-- Calibration note -->
  <text x="170" y="185" text-anchor="middle" font-size="8.5" fill="#5A5753">Electrode potential measured vs. reference; SOC inferred via calibrated dE/dS relationship</text>

  <!-- === RIGHT: CALIBRATION CURVE INSET === -->
  <!-- Panel background -->
  <rect x="340" y="28" width="200" height="158" rx="4" fill="#EDEAE3" stroke="#DDD8D0" stroke-width="1"/>
  <text x="440" y="44" text-anchor="middle" font-size="8.5" font-weight="600" fill="#1F1F1C">Calibration Curve</text>
  <text x="440" y="55" text-anchor="middle" font-size="7.5" fill="#5A5753">dE/dS versus 100 − SOC</text>

  <!-- Axes -->
  <!-- x-axis -->
  <line x1="365" y1="162" x2="526" y2="162" stroke="#1F1F1C" stroke-width="1.2"/>
  <!-- y-axis -->
  <line x1="365" y1="162" x2="365" y2="65" stroke="#1F1F1C" stroke-width="1.2"/>

  <!-- x-axis label and ticks -->
  <text x="445" y="176" text-anchor="middle" font-size="7.5" fill="#5A5753">100 − S (charge remaining)</text>
  <text x="365" y="170" text-anchor="middle" font-size="7" fill="#5A5753">20</text>
  <text x="405" y="170" text-anchor="middle" font-size="7" fill="#5A5753">40</text>
  <text x="445" y="170" text-anchor="middle" font-size="7" fill="#5A5753">60</text>
  <text x="485" y="170" text-anchor="middle" font-size="7" fill="#5A5753">80</text>
  <line x1="365" y1="162" x2="365" y2="165" stroke="#1F1F1C" stroke-width="1"/>
  <line x1="405" y1="162" x2="405" y2="165" stroke="#1F1F1C" stroke-width="1"/>
  <line x1="445" y1="162" x2="445" y2="165" stroke="#1F1F1C" stroke-width="1"/>
  <line x1="485" y1="162" x2="485" y2="165" stroke="#1F1F1C" stroke-width="1"/>

  <!-- y-axis label and ticks -->
  <text x="350" y="116" text-anchor="middle" font-size="7.5" fill="#5A5753" transform="rotate(-90, 350, 116)">dE/dS</text>
  <text x="362" y="163" text-anchor="end" font-size="7" fill="#5A5753">0.001</text>
  <text x="362" y="130" text-anchor="end" font-size="7" fill="#5A5753">0.0015</text>
  <text x="362" y="97" text-anchor="end" font-size="7" fill="#5A5753">0.002</text>
  <line x1="363" y1="162" x2="365" y2="162" stroke="#1F1F1C" stroke-width="1"/>
  <line x1="363" y1="129" x2="365" y2="129" stroke="#1F1F1C" stroke-width="1"/>
  <line x1="363" y1="96"  x2="365" y2="96"  stroke="#1F1F1C" stroke-width="1"/>

  <!--
    dE/dS curve: U-shaped minimum around 100-S = 50 (SOC=50%)
    x: 365 + (100-S - 20) * (160/60) = 365 + (val-20)*2.667
      val=20 → x=365, val=40 → x=392, val=50 → x=419, val=60 → x=445, val=70 → x=472, val=80 → x=499
    y: 162 - (dE - 0.001) * (66/0.001) = 162 - (dE-0.001)*66000
      dE=0.001 → y=162, dE=0.0015 → y=129, dE=0.002 → y=96

    U-shape: high at left, dips to minimum ~dE=0.001 around val=45-55, rises steeply at right
  -->
  <polyline fill="none" stroke="#1F1F1C" stroke-width="1.8" stroke-linejoin="round"
    points="365,140 379,130 392,122 406,115 419,113 432,114 445,117 458,122 472,132 485,148 499,162"/>
  <!-- Data scatter dots (to match patent figure style) -->
  <circle cx="365" cy="140" r="2.5" fill="#1F1F1C"/>
  <circle cx="378" cy="131" r="2.5" fill="#1F1F1C"/>
  <circle cx="392" cy="124" r="2.5" fill="#1F1F1C"/>
  <circle cx="405" cy="116" r="2.5" fill="#1F1F1C"/>
  <circle cx="419" cy="113" r="2.5" fill="#1F1F1C"/>
  <circle cx="432" cy="113" r="2.5" fill="#1F1F1C"/>
  <circle cx="445" cy="116" r="2.5" fill="#1F1F1C"/>
  <circle cx="459" cy="121" r="2.5" fill="#1F1F1C"/>
  <circle cx="472" cy="130" r="2.5" fill="#1F1F1C"/>
  <circle cx="485" cy="147" r="2.5" fill="#1F1F1C"/>
  <circle cx="498" cy="160" r="2.5" fill="#1F1F1C"/>

  <!-- Minimum annotation -->
  <text x="430" y="108" text-anchor="middle" font-size="7" fill="#C96442">minimum at 50% SOC</text>
</svg>
