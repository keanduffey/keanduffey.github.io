<svg width="600" height="262" viewBox="0 0 600 262" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" role="img"
     aria-label="Two-panel chart showing power module string currents: left panel with all stacks at stable resistance, right panel showing one stack progressively degrading and its string current collapsing while other strings compensate">

  <rect width="600" height="262" fill="#fff"/>

  <!-- y mapping: 100–500 A over 175px (y=28 to y=208) -->
  <!-- y = 208 - (A-100)*(180/400) = 208 - (A-100)*0.45 -->
  <!-- A=100→y=208, A=200→y=163, A=250→y=140, A=300→y=118, A=350→y=95, A=400→y=73, A=450→y=50, A=500→y=28 -->
  <!-- x: 0–45000 s over 235px each panel -->
  <!-- Left: x=52+(t*235/45000). Right: x=332+(t*235/45000) -->

  <!-- ═══ LEFT PANEL ════════════════════════════════════════════════ -->
  <!-- Grid -->
  <line x1="52" y1="208" x2="287" y2="208" stroke="#DDD8D0" stroke-width="1"/>
  <line x1="52" y1="163" x2="287" y2="163" stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="52" y1="118" x2="287" y2="118" stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="52" y1="73"  x2="287" y2="73"  stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="52" y1="28"  x2="287" y2="28"  stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="52" y1="28"  x2="52"  y2="208" stroke="#DDD8D0" stroke-width="1"/>

  <!-- Axes -->
  <line x1="52" y1="28"  x2="52"  y2="210" stroke="#888580" stroke-width="1.3"/>
  <line x1="50" y1="208" x2="289" y2="208" stroke="#888580" stroke-width="1.3"/>

  <!-- Y labels -->
  <text x="48" y="211" text-anchor="end" font-size="8">100</text>
  <text x="48" y="166" text-anchor="end" font-size="8">200</text>
  <text x="48" y="121" text-anchor="end" font-size="8">300</text>
  <text x="48" y="76"  text-anchor="end" font-size="8">400</text>
  <text x="48" y="31"  text-anchor="end" font-size="8">500</text>
  <text x="11" y="120" text-anchor="middle" font-size="9" fill="#333" transform="rotate(-90,11,120)">PM String Currents (Amps)</text>

  <!-- X labels -->
  <text x="52"  y="220" text-anchor="middle" font-size="8">0</text>
  <text x="104" y="220" text-anchor="middle" font-size="8">10000</text>
  <text x="156" y="220" text-anchor="middle" font-size="8">20000</text>
  <text x="209" y="220" text-anchor="middle" font-size="8">30000</text>
  <text x="261" y="220" text-anchor="middle" font-size="8">40000</text>
  <text x="170" y="232" text-anchor="middle" font-size="9" fill="#333">Time (sec)</text>

  <text x="170" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#333">String Currents w/ Stable Stack Res.</text>

  <!-- 4 stable strings: spread at start (~250-290A), dip at t≈24000, converge to 500A at end -->
  <!-- Red (String 1): ~290A start -->
  <polyline fill="none" stroke="#C94040" stroke-width="1.8" stroke-linejoin="round"
    points="52,118 78,126 104,133 130,139 156,145 169,162 174,165 183,158 209,118 235,86 261,55 274,30 287,28"/>
  <!-- Blue (String 2): ~275A start -->
  <polyline fill="none" stroke="#4A7A9B" stroke-width="1.8" stroke-linejoin="round"
    points="52,126 78,134 104,140 130,146 156,152 169,168 174,171 183,164 209,124 235,91 261,59 274,32 287,29"/>
  <!-- Green (String 3): ~262A start -->
  <polyline fill="none" stroke="#5A8A5A" stroke-width="1.8" stroke-linejoin="round"
    points="52,133 78,141 104,147 130,153 156,158 169,175 174,178 183,170 209,129 235,95 261,62 274,34 287,30"/>
  <!-- Orange (String 4): ~250A start -->
  <polyline fill="none" stroke="#C96442" stroke-width="1.8" stroke-linejoin="round"
    points="52,140 78,147 104,153 130,159 156,165 169,181 174,184 183,176 209,134 235,99 261,65 274,36 287,31"/>

  <!-- Legend -->
  <rect x="180" y="35" width="100" height="60" rx="2" fill="#fff" fill-opacity="0.9" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="188" y1="48" x2="202" y2="48" stroke="#C94040" stroke-width="1.8"/>
  <text x="206" y="51" font-size="8" fill="#333">String 1</text>
  <line x1="188" y1="60" x2="202" y2="60" stroke="#4A7A9B" stroke-width="1.8"/>
  <text x="206" y="63" font-size="8" fill="#333">String 2</text>
  <line x1="188" y1="72" x2="202" y2="72" stroke="#5A8A5A" stroke-width="1.8"/>
  <text x="206" y="75" font-size="8" fill="#333">String 3</text>
  <line x1="188" y1="84" x2="202" y2="84" stroke="#C96442" stroke-width="1.8"/>
  <text x="206" y="87" font-size="8" fill="#333">String 4</text>

  <!-- ═══ RIGHT PANEL (failure) ═══════════════════════════════════ -->
  <!-- Grid -->
  <line x1="332" y1="208" x2="567" y2="208" stroke="#DDD8D0" stroke-width="1"/>
  <line x1="332" y1="163" x2="567" y2="163" stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="332" y1="118" x2="567" y2="118" stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="332" y1="73"  x2="567" y2="73"  stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="332" y1="28"  x2="567" y2="28"  stroke="#DDD8D0" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="332" y1="28"  x2="332" y2="208" stroke="#DDD8D0" stroke-width="1"/>

  <!-- Axes -->
  <line x1="332" y1="28"  x2="332" y2="210" stroke="#888580" stroke-width="1.3"/>
  <line x1="330" y1="208" x2="569" y2="208" stroke="#888580" stroke-width="1.3"/>

  <!-- Y labels -->
  <text x="328" y="211" text-anchor="end" font-size="8">100</text>
  <text x="328" y="166" text-anchor="end" font-size="8">200</text>
  <text x="328" y="121" text-anchor="end" font-size="8">300</text>
  <text x="328" y="76"  text-anchor="end" font-size="8">400</text>
  <text x="328" y="31"  text-anchor="end" font-size="8">500</text>
  <text x="295" y="120" text-anchor="middle" font-size="9" fill="#333" transform="rotate(-90,295,120)">PM String Currents (Amps)</text>

  <!-- X labels -->
  <text x="332" y="220" text-anchor="middle" font-size="8">0</text>
  <text x="384" y="220" text-anchor="middle" font-size="8">10000</text>
  <text x="436" y="220" text-anchor="middle" font-size="8">20000</text>
  <text x="489" y="220" text-anchor="middle" font-size="8">30000</text>
  <text x="541" y="220" text-anchor="middle" font-size="8">40000</text>
  <text x="450" y="232" text-anchor="middle" font-size="9" fill="#333">Time (sec)</text>

  <text x="450" y="16" text-anchor="middle" font-size="9" font-weight="600" fill="#333">String 1 w/ a Single Decaying Stack Res.</text>

  <!-- String 1 FAILING (blue): starts at ~290A, decays to ~110A -->
  <polyline fill="none" stroke="#4A7A9B" stroke-width="2" stroke-linejoin="round"
    points="332,118 358,128 384,141 410,155 436,165 462,178 489,187 515,196 541,202 554,205 567,206"/>

  <!-- Strings 2,3,4 (stable, compensating): same shape as left panel -->
  <polyline fill="none" stroke="#C94040" stroke-width="1.8" stroke-linejoin="round"
    points="332,133 358,140 384,146 410,152 436,158 449,174 454,177 463,170 489,130 515,97 541,65 554,40 567,29"/>
  <polyline fill="none" stroke="#5A8A5A" stroke-width="1.8" stroke-linejoin="round"
    points="332,140 358,147 384,153 410,159 436,165 449,181 454,184 463,176 489,134 515,101 541,67 554,42 567,30"/>
  <polyline fill="none" stroke="#C96442" stroke-width="1.8" stroke-linejoin="round"
    points="332,147 358,154 384,160 410,166 436,172 449,188 454,191 463,183 489,138 515,105 541,70 554,44 567,31"/>

  <!-- Legend right -->
  <rect x="340" y="35" width="140" height="60" rx="2" fill="#fff" fill-opacity="0.9" stroke="#DDD8D0" stroke-width="0.8"/>
  <line x1="348" y1="48" x2="362" y2="48" stroke="#4A7A9B" stroke-width="2"/>
  <text x="366" y="51" font-size="8" fill="#333">String 1 (decaying)</text>
  <line x1="348" y1="60" x2="362" y2="60" stroke="#C94040" stroke-width="1.8"/>
  <text x="366" y="63" font-size="8" fill="#333">String 2</text>
  <line x1="348" y1="72" x2="362" y2="72" stroke="#5A8A5A" stroke-width="1.8"/>
  <text x="366" y="75" font-size="8" fill="#333">String 3</text>
  <line x1="348" y1="84" x2="362" y2="84" stroke="#C96442" stroke-width="1.8"/>
  <text x="366" y="87" font-size="8" fill="#333">String 4</text>

  <!-- Panel divider -->
  <line x1="300" y1="10" x2="300" y2="240" stroke="#DDD8D0" stroke-width="1.2"/>
</svg>
