<svg width="580" height="270" viewBox="0 0 580 270" xmlns="http://www.w3.org/2000/svg"
     font-family="Inter, system-ui, sans-serif" role="img"
     aria-label="Energy Storage Unit block diagram showing two electrolyte tanks feeding four parallel cell stacks connected to an inverter, all within a repeating ESU module">
  <defs>
    <marker id="bd-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A5753"/>
    </marker>
    <marker id="bd-arr-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A7A9B"/>
    </marker>
    <marker id="bd-arr-pos" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#C96442"/>
    </marker>
  </defs>

  <rect width="580" height="270" fill="#F5F1EB"/>

  <!-- ESU dashed bounding box -->
  <rect x="10" y="14" width="484" height="248" rx="6" fill="none" stroke="#1F1F1C" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="252" y="11" text-anchor="middle" font-size="10" font-weight="600" fill="#1F1F1C">Energy Storage Unit (ESU)</text>

  <!-- Repeat indicator (ghost ESU at offset, behind main) -->
  <rect x="22" y="22" width="484" height="248" rx="6" fill="none" stroke="#DDD8D0" stroke-width="1" stroke-dasharray="6,5" opacity="0.6"/>

  <!-- ── TANKS ────────────────────────────────────────── -->
  <!-- Neg Tank -->
  <rect x="28" y="52" width="96" height="80" rx="4" fill="#D6E8F2" stroke="#4A7A9B" stroke-width="1.5"/>
  <text x="76" y="85" text-anchor="middle" font-size="10" font-weight="600" fill="#2A527A">Negative</text>
  <text x="76" y="100" text-anchor="middle" font-size="10" fill="#2A527A">Electrolyte</text>
  <text x="76" y="115" text-anchor="middle" font-size="9" fill="#4A7A9B">Tank</text>

  <!-- Pos Tank -->
  <rect x="28" y="162" width="96" height="80" rx="4" fill="#F5E2D8" stroke="#C96442" stroke-width="1.5"/>
  <text x="76" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#7A3018">Positive</text>
  <text x="76" y="210" text-anchor="middle" font-size="10" fill="#7A3018">Electrolyte</text>
  <text x="76" y="225" text-anchor="middle" font-size="9" fill="#C96442">Tank</text>

  <!-- ── STACKS ───────────────────────────────────────── -->
  <!-- Stack label at top -->
  <text x="258" y="40" text-anchor="middle" font-size="9" fill="#5A5753">4 × cell stack (parallel)</text>

  <!-- Stack 1 -->
  <rect x="188" y="48" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="70" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Cell Stack 1</text>

  <!-- Stack 2 -->
  <rect x="188" y="96" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Cell Stack 2</text>

  <!-- Stack 3 -->
  <rect x="188" y="158" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Cell Stack 3</text>

  <!-- Stack 4 -->
  <rect x="188" y="206" width="110" height="36" rx="3" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.4"/>
  <text x="243" y="228" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Cell Stack 4</text>

  <!-- ── FLOW CONNECTIONS (tanks to stacks) ───────────── -->
  <!-- Neg tank (right edge x=124) to stacks via manifold (vertical line at x=160) -->
  <line x1="124" y1="92"  x2="160" y2="92"  stroke="#4A7A9B" stroke-width="1.4" marker-end="url(#bd-arr-acc)"/>
  <!-- Neg manifold vertical -->
  <line x1="160" y1="66"  x2="160" y2="224" stroke="#4A7A9B" stroke-width="1.4"/>
  <!-- Branches from neg manifold to each stack -->
  <line x1="160" y1="66"  x2="188" y2="66"  stroke="#4A7A9B" stroke-width="1.4" marker-end="url(#bd-arr-acc)"/>
  <line x1="160" y1="114" x2="188" y2="114" stroke="#4A7A9B" stroke-width="1.4" marker-end="url(#bd-arr-acc)"/>
  <line x1="160" y1="176" x2="188" y2="176" stroke="#4A7A9B" stroke-width="1.4" marker-end="url(#bd-arr-acc)"/>
  <line x1="160" y1="224" x2="188" y2="224" stroke="#4A7A9B" stroke-width="1.4" marker-end="url(#bd-arr-acc)"/>

  <!-- Pos tank (right edge x=124) to stacks via manifold (vertical line at x=170, offset slightly) -->
  <line x1="124" y1="202" x2="170" y2="202" stroke="#C96442" stroke-width="1.4" marker-end="url(#bd-arr-pos)"/>
  <!-- Pos manifold vertical -->
  <line x1="170" y1="60"  x2="170" y2="236" stroke="#C96442" stroke-width="1.4"/>
  <!-- Branches (at stack bottom of each) -->
  <line x1="170" y1="78"  x2="188" y2="78"  stroke="#C96442" stroke-width="1.4" marker-end="url(#bd-arr-pos)"/>
  <line x1="170" y1="126" x2="188" y2="126" stroke="#C96442" stroke-width="1.4" marker-end="url(#bd-arr-pos)"/>
  <line x1="170" y1="188" x2="188" y2="188" stroke="#C96442" stroke-width="1.4" marker-end="url(#bd-arr-pos)"/>
  <line x1="170" y1="236" x2="188" y2="236" stroke="#C96442" stroke-width="1.4" marker-end="url(#bd-arr-pos)"/>

  <!-- ── DC BUS (stacks to inverter) ──────────────────── -->
  <!-- Vertical DC bus at x=310 -->
  <line x1="310" y1="66" x2="310" y2="224" stroke="#1F1F1C" stroke-width="1.8"/>
  <!-- Horizontal branches from each stack right edge (x=298) to DC bus (x=310) -->
  <line x1="298" y1="66" x2="310" y2="66" stroke="#1F1F1C" stroke-width="1.4"/>
  <line x1="298" y1="114" x2="310" y2="114" stroke="#1F1F1C" stroke-width="1.4"/>
  <line x1="298" y1="176" x2="310" y2="176" stroke="#1F1F1C" stroke-width="1.4"/>
  <line x1="298" y1="224" x2="310" y2="224" stroke="#1F1F1C" stroke-width="1.4"/>
  <!-- DC label on bus -->
  <text x="313" y="138" font-size="8.5" fill="#5A5753">DC</text>
  <text x="313" y="150" font-size="8.5" fill="#5A5753">bus</text>

  <!-- DC to inverter arrow -->
  <line x1="322" y1="138" x2="350" y2="138" stroke="#1F1F1C" stroke-width="1.5" marker-end="url(#bd-arr)"/>

  <!-- ── INVERTER ───────────────────────────────────────── -->
  <rect x="352" y="108" width="80" height="60" rx="4" fill="#EDEAE3" stroke="#1F1F1C" stroke-width="1.5"/>
  <text x="392" y="134" text-anchor="middle" font-size="9" font-weight="600" fill="#1F1F1C">Inverter</text>
  <text x="392" y="148" text-anchor="middle" font-size="8.5" fill="#5A5753">DC → AC</text>
  <text x="392" y="160" text-anchor="middle" font-size="8.5" fill="#5A5753">conversion</text>

  <!-- AC output arrow -->
  <line x1="432" y1="138" x2="460" y2="138" stroke="#1F1F1C" stroke-width="1.5" marker-end="url(#bd-arr)"/>
  <text x="463" y="134" font-size="9" fill="#1F1F1C">AC</text>
  <text x="463" y="146" font-size="9" fill="#1F1F1C">Grid</text>

  <!-- Legend for flow colors -->
  <line x1="30" y1="252" x2="50" y2="252" stroke="#4A7A9B" stroke-width="2"/>
  <text x="54" y="256" font-size="8" fill="#5A5753">neg. electrolyte</text>
  <line x1="140" y1="252" x2="160" y2="252" stroke="#C96442" stroke-width="2"/>
  <text x="164" y="256" font-size="8" fill="#5A5753">pos. electrolyte</text>
  <line x1="245" y1="252" x2="265" y2="252" stroke="#1F1F1C" stroke-width="2"/>
  <text x="269" y="256" font-size="8" fill="#5A5753">DC power</text>

  <!-- × N ESU note -->
  <text x="520" y="138" text-anchor="middle" font-size="10" font-weight="600" fill="#5A5753">× N</text>
  <text x="520" y="152" text-anchor="middle" font-size="8.5" fill="#5A5753">ESUs</text>
</svg>
